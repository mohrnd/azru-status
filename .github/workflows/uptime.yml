name: Uptime CI
on:
  schedule:
    - cron: "*/3 8-18 * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:
jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check time window (10:00–21:00 Europe/Paris)
        id: timecheck
        run: |
          HOUR=$(TZ="Europe/Paris" date +%H)
          HOUR=$((10#$HOUR))
          echo "Current hour in Paris: $HOUR"
          if [ "$HOUR" -lt 10 ] || [ "$HOUR" -ge 21 ]; then
            echo "Outside monitoring window (10:00–21:00). Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Inside monitoring window. Proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check endpoint status
        if: steps.timecheck.outputs.skip == 'false'
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
