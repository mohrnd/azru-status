name: Uptime CI
on:
  schedule:
    - cron: "*/5 8-18 * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:
jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    steps:
      - name: Check monitoring window (10:00–21:00 UTC+2)
        run: |
          HOUR=$(TZ=Europe/Paris date +%H)
          if [ "$HOUR" -lt 10 ] || [ "$HOUR" -ge 21 ]; then
            echo "Outside monitoring window ($HOUR:xx Paris time). Skipping."
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Check endpoint status
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
