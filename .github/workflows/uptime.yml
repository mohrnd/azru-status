name: Uptime CI
on:
  schedule:
    - cron: "*/3 8-18 * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:
jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    steps:
      - name: Check operating hours (10:00–21:00 Paris time)
        id: hours
        run: |
          HOUR=$(TZ="Europe/Paris" date +%H)
          if [ "$HOUR" -lt 10 ] || [ "$HOUR" -ge 21 ]; then
            echo "in_hours=false" >> $GITHUB_OUTPUT
          else
            echo "in_hours=true" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        if: steps.hours.outputs.in_hours == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Check endpoint status
        if: steps.hours.outputs.in_hours == 'true'
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}