#
# ===============================
# CUSTOMIZED — scheduled auto-update DISABLED
# ===============================
#
# The scheduled run is intentionally removed. Running this automatically
# regenerates site.yml (and other workflows) from the Upptime template,
# which overwrites our custom site.yml and blows away the custom index.html.
#
# You can still trigger this manually from Actions > Update Template CI
# if you genuinely need to pull in Upptime template updates.

name: Update Template CI
on:
  repository_dispatch:
    types: [update_template]
  workflow_dispatch:
jobs:
  release:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Update template
        uses: upptime/uptime-monitor@master
        with:
          command: "update-template"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
