#
# ===============================
# CUSTOMIZED — do not let update-template overwrite this
# ===============================
#
# Deploys the hand-crafted index.html directly to GitHub Pages.
# We intentionally do NOT run Upptime's site generator here because it
# overwrites our custom page with the default Upptime Sapper template.

name: Static Site CI
on:
  push:
    branches:
      - master
    paths:
      - "index.html"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:
jobs:
  release:
    name: Deploy custom status page
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Prepare publish dir
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - uses: peaceiris/actions-gh-pages@v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: "_site"
          force_orphan: "false"
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
