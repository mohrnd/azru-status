# ── Schedule ──────────────────────────────────────────────────────────────────
# Monitoring window: 10:00–21:00 France time (UTC+2 in Summer)
# 10:00 CEST = 08:00 UTC | 21:00 CEST = 19:00 UTC
# FIX applied: Runs every 10 mins. The LAST run is at 18:50 UTC.
# This gives GitHub Actions a 10-minute safe buffer to clear the queue 
# before the servers go dark at 19:00 UTC.
workflowSchedule:
  uptime: "*/10 8-18 * * *"
  graphs: "0 18 * * *"
  responseTime: "0 18 * * *"
  staticSite: "5 18 * * *"
  summary: "10 18 * * *"
  updateTemplate: "0 4 * * 0"
  updates: "0 3 * * *"

# ── Status page ───────────────────────────────────────────────────────────────
status-website:
  cname: status.azru.cloud
  name: AZRU Status
  logoUrl: https://raw.githubusercontent.com/mohrnd/azru-status/master/assets/azru-logo.svg
  introTitle: "AZRU Platform Status"
  introMessage: "Real-time status for the AZRU cloud platform. Monitored automatically via GitHub Actions."

  customHeadHtml: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="https://azru.cloud/static/img/azru-favicon.svg">
    <style>
      /* ── AZRU Design System ── */
      :root {
        --bg:             #0a0a0b;
        --bg-surface:     #111113;
        --bg-elevated:    #19191c;
        --border:         #222226;
        --border-hover:   #333338;
        --text:           #ffffff;
        --text-secondary: #a0a0a8;
        --text-muted:     #505058;
        --accent:         #6c63ff;
        --success:        #10B981; /* Claude Green */
        --warning:        #F59E0B; /* Claude Yellow */
        --danger:         #EF4444; /* Claude Red */
        --font-sans:      'Geist', system-ui, -apple-system, sans-serif;
        --font-mono:      'IBM Plex Mono', monospace;
        --radius:         6px;
      }

      body { background: var(--bg) !important; color: var(--text) !important; font-family: var(--font-sans) !important; margin: 0; }
      a { color: var(--accent); text-decoration: none; }
      
      /* Grid and glow */
      body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; z-index: 0; }
      body::after { content: ''; position: fixed; top: -200px; left: -200px; width: 700px; height: 700px; background: radial-gradient(ellipse, rgba(108,99,255,.16) 0%, transparent 70%); pointer-events: none; z-index: 0; }
      body > * { position: relative; z-index: 1; }

      /* Nav */
      header, nav, .navbar, .header { background: rgba(10,10,11,.88) !important; backdrop-filter: blur(12px) !important; border-bottom: 1px solid rgba(255,255,255,.05) !important; position: sticky !important; top: 0 !important; z-index: 50 !important; display: flex !important; align-items: center !important; padding: 0 24px !important; height: 52px !important; }
      nav img, header img { height: 24px !important; width: auto !important; margin-right: 10px !important; }
      nav span, header span { font-size: 14px !important; font-weight: 600 !important; color: var(--text) !important; }

      main, .container { max-width: 860px !important; margin: 0 auto !important; padding: 40px 24px !important; }
      article img { display: none !important; } /* Hide service icons */

      /* Cards */
      article, .status-item { background: var(--bg-surface) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) !important; padding: 16px !important; margin-bottom: 12px !important; }
      
      /* Hide Upptime Native Uptime Bars Completely */
      section.live-status article > div:not(.azru-uptime-wrapper):has(a[style*="background-color"]),
      section.live-status article > div.flex.items-center.justify-between + div.flex {
        display: none !important;
      }

      /* ── Claude Style Rectangles ── */
      .azru-uptime-wrapper { margin: 16px 0 8px; width: 100%; }
      .azru-bars-track {
        display: flex;
        gap: 3px; /* Distinct gap creates the 'rectangle' look */
        height: 36px;
        align-items: stretch;
        width: 100%;
      }
      .azru-bar {
        flex: 1;
        border-radius: 2px;
        position: relative;
        transition: opacity 0.15s, transform 0.15s;
        cursor: pointer;
      }
      .azru-bar:hover { opacity: 0.8; transform: scaleY(1.1); z-index: 2; }
      
      /* Colors */
      .azru-bar.up      { background: var(--success); }
      .azru-bar.partial { background: var(--warning); }
      .azru-bar.down    { background: var(--danger); }
      .azru-bar.empty   { background: #2A2A30; }

      /* Labels */
      .azru-bars-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 8px; }
      .azru-uptime-pct { color: var(--success); font-weight: 600; margin-right: 6px; }

      /* Tooltip */
      .azru-bar::after {
        content: attr(data-tip);
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-elevated);
        border: 1px solid var(--border-hover);
        color: var(--text-secondary);
        font-family: var(--font-mono);
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 4px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.1s;
        z-index: 99;
      }
      .azru-bar:hover::after { opacity: 1; }
    </style>
    
    <script>
    (function() {
      const OWNER = 'mohrnd';
      const REPO  = 'azru-status';
      const DAYS  = 90;

      function isoDate(d) { return d.toISOString().slice(0, 10); }

      function buildDays(dailyMinutesDown) {
        const today = new Date();
        const result = [];
        for (let i = DAYS - 1; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(d.getDate() - i);
          const key = isoDate(d);
          const mins = dailyMinutesDown[key] ?? null; // Null means no data
          let cls = 'empty';
          if (mins !== null) {
            if (mins > 240) cls = 'down';
            else if (mins > 0) cls = 'partial';
            else cls = 'up';
          }
          result.push({ date: key, mins, cls });
        }
        return result;
      }

      function uptimePct(days) {
        const activeDays = days.filter(d => d.mins !== null);
        if (activeDays.length === 0) return "100.00";
        const totalMins = activeDays.length * 24 * 60;
        const downMins  = activeDays.reduce((s, d) => s + (d.mins || 0), 0);
        return ((totalMins - downMins) / totalMins * 100).toFixed(2);
      }

      function renderBars(container, days) {
        const pct = uptimePct(days);
        const wrapper  = document.createElement('div');
        wrapper.className = 'azru-uptime-wrapper';

        const track = document.createElement('div');
        track.className = 'azru-bars-track';

        days.forEach(day => {
          const bar = document.createElement('div');
          bar.className = 'azru-bar ' + day.cls;
          let tip = day.date;
          if (day.mins !== null) {
            if (day.mins > 0) tip += ' · ' + day.mins + 'm down';
            else tip += ' · Operational';
          } else {
            tip += ' · No data';
          }
          bar.setAttribute('data-tip', tip);
          track.appendChild(bar);
        });

        const labels = document.createElement('div');
        labels.className = 'azru-bars-labels';
        labels.innerHTML = `<span>${DAYS} days ago</span><span><span class="azru-uptime-pct">${pct}% uptime</span>Today</span>`;

        wrapper.appendChild(track);
        wrapper.appendChild(labels);
        container.appendChild(wrapper);
      }

      function injectBars(summaryData) {
        const bySlug = {};
        summaryData.forEach(s => { bySlug[s.slug] = s.dailyMinutesDown || {}; });

        function tryInject() {
          const articles = document.querySelectorAll('section.live-status article');
          if (!articles.length) return false;
          
          articles.forEach(art => {
            if (art.querySelector('.azru-uptime-wrapper')) return;
            const link = art.querySelector('a[href]');
            if (!link) return;
            
            const slug = link.getAttribute('href').replace(/^\//, '').split('/')[0];
            const dmDown = bySlug[slug] || {};
            const days = buildDays(dmDown);
            
            renderBars(art, days);
          });
          return true;
        }

        if (!tryInject()) {
          const obs = new MutationObserver(() => {
            if (tryInject()) obs.disconnect();
          });
          obs.observe(document.body, { childList: true, subtree: true });
        }
      }

      fetch('https://raw.githubusercontent.com/' + OWNER + '/' + REPO + '/master/history/summary.json')
        .then(r => r.json())
        .then(injectBars)
        .catch(console.error);
    })();
    </script>

  i18n:
    activeIncidents: "Active incidents"
    footer: "AZRU Platform"
