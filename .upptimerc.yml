# ── AZRU Status Page — Upptime Configuration ─────────────────────────────────

owner: mohrnd
repo: azru-status

# ── Services ──────────────────────────────────────────────────────────────────
sites:

  # ── Web ─────────────────────────────────────────────────────────────────────

  - name: azru.cloud
    url: https://azru.cloud
    icon: https://azru.cloud/static/img/azru-favicon.svg

  - name: pebble.azru.cloud
    url: https://pebble.azru.cloud
    icon: https://azru.cloud/static/img/azru-favicon.svg
    maxResponseTime: 3000

  - name: API
    url: https://pebble.azru.cloud/api/v1/health/ping
    icon: https://azru.cloud/static/img/azru-favicon.svg
    expectedStatusCodes:
      - 200

  # ── OpenStack ────────────────────────────────────────────────────────────────

  - name: Keystone (Identity)
    url: https://pebble.azru.cloud/api/v1/status/keystone
    icon: https://azru.cloud/static/img/azru-favicon.svg
    expectedStatusCodes:
      - 200
    maxResponseTime: 45000

  - name: Nova (Compute)
    url: https://pebble.azru.cloud/api/v1/status/nova
    icon: https://azru.cloud/static/img/azru-favicon.svg
    expectedStatusCodes:
      - 200
    maxResponseTime: 45000

  - name: Neutron (Network)
    url: https://pebble.azru.cloud/api/v1/status/neutron
    icon: https://azru.cloud/static/img/azru-favicon.svg
    expectedStatusCodes:
      - 200
    maxResponseTime: 45000

  - name: Glance (Images)
    url: https://pebble.azru.cloud/api/v1/status/glance
    icon: https://azru.cloud/static/img/azru-favicon.svg
    expectedStatusCodes:
      - 200
    maxResponseTime: 45000

  - name: Cinder (Volumes)
    url: https://pebble.azru.cloud/api/v1/status/cinder
    icon: https://azru.cloud/static/img/azru-favicon.svg
    expectedStatusCodes:
      - 200
    maxResponseTime: 45000

# ── Schedule ──────────────────────────────────────────────────────────────────
# Monitoring window: 10:00–21:00 France time (UTC+2)
# → 08:00–19:00 UTC

workflowSchedule:
  uptime: "*/3 8-18 * * *"
  graphs: "0 18 * * *"
  responseTime: "0 18 * * *"
  staticSite: "5 18 * * *"
  summary: "10 18 * * *"
  updateTemplate: "0 4 * * 0"
  updates: "0 3 * * *"

# ── Status page ───────────────────────────────────────────────────────────────

status-website:

  cname: status.azru.cloud
  name: AZRU Status
  logoUrl: https://raw.githubusercontent.com/mohrnd/azru-status/master/assets/azru-logo.svg

  introTitle: "AZRU Platform Status"

  introMessage: >
    Real-time status for the AZRU cloud platform.
    Monitoring runs daily from 10:00 to 21:00 (UTC+2).

  customHeadHtml: |

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>

    :root {

      --bg: #0a0a0b;
      --bg-surface: #111113;
      --border: #222226;

      --text: #ffffff;
      --text-secondary: #a0a0a8;

      --success: #22d3a0;
      --warning: #f5a623;
      --danger: #f04040;

      --font-sans: 'Geist', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

    }

    body {

      background: var(--bg) !important;
      color: var(--text) !important;

      font-family: var(--font-sans) !important;

    }

    main {

      max-width: 860px !important;
      margin: 0 auto !important;
      padding: 40px 24px !important;

    }

    /* ───────────────────────────── */
    /* Service Cards */
    /* ───────────────────────────── */

    article {

      background: var(--bg-surface) !important;

      border: 1px solid var(--border) !important;

      border-radius: 6px !important;

      padding: 16px !important;

      margin-bottom: 8px !important;

    }

    /* ───────────────────────────── */
    /* Claude-style rectangle bars */
    /* ───────────────────────────── */

    section.live-status article > div:nth-child(2),
    section.live-status article > div:last-child {

      display: flex !important;

      height: 36px !important;

      gap: 2px !important;

      align-items: stretch !important;

      overflow: hidden !important;

      margin: 10px 0 6px !important;

    }

    section.live-status article a[style] {

      flex: 1 1 0 !important;

      min-width: 5px !important;

      height: 100% !important;

      border-radius: 2px !important;

      display: block !important;

      opacity: 0.9 !important;

      transition: filter 0.1s ease !important;

    }

    section.live-status article a[style]:hover {

      filter: brightness(1.3);

    }

    </style>

  i18n:

    activeIncidents: "Active incidents"

    footer: "AZRU Platform — Powered by Upptime"
